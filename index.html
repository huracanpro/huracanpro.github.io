<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>huracans site for games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">🎮 ARCADE<span>HUB</span></div>
        <p class="subtitle">huracans web</p>
    </header>
    
    <main class="grid-container">
        <section class="game-grid" id="arcade-grid">
            </section>
    </main>

    <div class="theater-overlay" id="game-player">
        <div class="theater-content">
            <div class="theater-controls">
                <h2 id="current-game-title">Game Loading...</h2>
                <button class="close-btn" onclick="closeGame()">❌ Close Game</button>
            </div>
            <div class="frame-wrapper">
                <iframe id="game-frame" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 ArcadeHub Portal. Streamlined for pure performance.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
